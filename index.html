<!DOCTYPE html>
<html>
    <head>
        <title>Mi primer Proyecto</title>
        <style>
            body{
                background-color: #2c3e50;
                color: white;
                font-family: Arial, sans-serif;
                text-align: center;
                padding-top: 50px;
            }
            h1 {
                color: #00ffcc;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                background-color: #00ffcc;
                color: #2c3e50;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
                margin-top: 20px;
            }
            button:hover {
                backgroung-color: white;
                transform: scale(1.1);
                transition: 0.3s;
            }
            a:hover {
                color: #ff5722;
                text-decoration: none;
                transition: 0.3s;
                input[type="text"], textarea {
                    width: 100%;
                    padding: 12px;
                    border: 2px solid #ccc;
                    border-radius: 8px;
                    box-sizing: border-box;
                    font-family: inherit;
                    margin-bottom: 15px;
                    transition: 0.3s;
                }

                input[type="text"]:focus, textarea:focus {
                    border-color: #ff5722;
                    outline: none;
                }
            }
        </style>
    </head>
    <body>
        <h1>¡hola Mundo!</h1>
        <img src="logo.jpg" alt="Mi foto de perfil" width="200">
        <p>Soy Simón y este es mi primer paso como programador Full Stack.</p>
        <h2>Mi ruta de aprendizaje</h2>
        <ul>
            <li>Dominar HTML (Estructura)</li>
            <li>Dominar CSS (Estilo)</li>
            <li>Dominar JavaScript (Interactividad)</li>
        </ul>
        <a href="https://github.com" target="_blank">Visitar mi futuro GitHub</a>
        <hr>
        <h2>Contáctame</h2>
        <form>
            <input type="text" placeholder="Tu Nombre">
            <br><br>
            <textarea placeholder="Escribe tu mensaje aquí..." rows="4"></textarea>
            <br><br>
            <button type="submit">Enviar Mensaje</button>
        </form>
        <button onclick="alert('¡wow, mi primer código en Javascript funciona!')">¡haz clic aquí!</button>
    </body>
</html>
